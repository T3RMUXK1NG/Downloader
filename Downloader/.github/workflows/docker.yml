# RS TOOLKIT v3.0.1 ULTIMATE NEXUS - Docker Build & Push Workflow
# ═══════════════════════════════════════════════════════════════════════════════
# Author: RAJSARASWATI JATAV (RS) - T3rmuxk1ng
# License: OMNIPOTENT SOVEREIGN NEXUS
#
# This workflow builds and pushes Docker images to multiple registries:
#   - Docker Hub
#   - GitHub Container Registry (ghcr.io)
#   - AWS ECR (optional)
#
# Features:
#   - Multi-platform builds (amd64, arm64)
#   - Build caching for faster builds
#   - Security scanning with Trivy
#   - Automated tagging
#   - SBOM generation
# ═══════════════════════════════════════════════════════════════════════════════

name: 🐳 Docker Build & Push

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
      - '.dockerignore'
      - 'package.json'
      - '.github/workflows/docker.yml'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registries'
        required: true
        default: true
        type: boolean
      platforms:
        description: 'Build platforms'
        required: true
        default: 'linux/amd64,linux/arm64'
        type: string

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY
# ─────────────────────────────────────────────────────────────────────────────

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: '20.x'

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PREPARE: Setup and metadata
  # ═══════════════════════════════════════════════════════════════════════════

  prepare:
    name: 📋 Prepare
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📝 Extract version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"

      - name: 🏷️ Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_DOCKERHUB }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=ultimate-nexus
            type=raw,value=v${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.title=RS Toolkit
            org.opencontainers.image.description=Elite Security Toolkit - OMNIPOTENT SOVEREIGN NEXUS
            org.opencontainers.image.vendor=T3rmuxk1ng
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD: Multi-platform Docker build
  # ═══════════════════════════════════════════════════════════════════════════

  build:
    name: 🔨 Build Docker Image
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
            image=moby/buildkit:latest
          buildkitd-flags: --debug
          install: true

      - name: 🔐 Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔐 Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗃️ Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: 🔨 Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_image != 'false') }}
          tags: ${{ needs.prepare.outputs.tags }}
          labels: ${{ needs.prepare.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          provenance: true
          sbom: true
          outputs: type=docker,dest=/tmp/image.tar
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: 🔄 Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════════════════
  # SCAN: Security scanning
  # ═══════════════════════════════════════════════════════════════════════════

  scan:
    name: 🔒 Security Scan
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: 🐳 Load Docker image
        run: docker load --input /tmp/image.tar

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image.tar
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: true

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'docker'

      - name: 🔍 Run Grype vulnerability scanner
        uses: anchore/scan-action@v4
        with:
          image-reference: /tmp/image.tar
          format: 'sarif'
          output-file: 'grype-results.sarif'
          fail-build: false
        continue-on-error: true

      - name: 📊 Upload Grype scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'grype-results.sarif'
          category: 'docker-grype'

      - name: 📋 Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: /tmp/image.tar
          format: 'spdx-json'
          output-file: 'sbom-spdx.json'
          artifact-name: sbom-spdx

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-spdx.json
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST: Test Docker image
  # ═══════════════════════════════════════════════════════════════════════════

  test:
    name: 🧪 Test Docker Image
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: 🐳 Load Docker image
        run: docker load --input /tmp/image.tar

      - name: 🏃 Run container health check
        run: |
          # Get the image name
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)

          # Run container in background
          docker run -d --name test-container -p 3000:3000 "$IMAGE"

          # Wait for container to start
          sleep 10

          # Check if container is running
          if [ "$(docker inspect -f '{{.State.Running}}' test-container)" != "true" ]; then
            echo "❌ Container is not running"
            docker logs test-container
            exit 1
          fi

          # Health check
          for i in {1..30}; do
            if curl -f http://localhost:3000/api/health 2>/dev/null; then
              echo "✅ Health check passed"
              break
            fi
            echo "Waiting for health check... ($i/30)"
            sleep 2
          done

          # Show container logs
          docker logs test-container

          # Cleanup
          docker stop test-container
          docker rm test-container

  # ═══════════════════════════════════════════════════════════════════════════
  # PUSH-REGISTRIES: Push to multiple registries
  # ═══════════════════════════════════════════════════════════════════════════

  push-ghcr:
    name: 📤 Push to GHCR
    needs: [prepare, build, scan, test]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Load and push image
        run: |
          docker load --input /tmp/image.tar
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          docker push "$IMAGE"

      - name: ✅ Verify push
        run: |
          echo "✅ Image pushed to GHCR successfully"
          echo "📦 Image: ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}"

  # ═══════════════════════════════════════════════════════════════════════════
  # CLEANUP: Clean up artifacts
  # ═══════════════════════════════════════════════════════════════════════════

  cleanup:
    name: 🧹 Cleanup
    needs: [build, scan, test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 🗑️ Delete artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: docker-image
          failOnError: false
