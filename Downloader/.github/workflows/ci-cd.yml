# ═══════════════════════════════════════════════════════════════════════════════
# RS TOOLKIT v3.0.1 ULTIMATE NEXUS - Main CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
# Author: RAJSARASWATI JATAV (RS) - T3rmuxk1ng
# License: OMNIPOTENT SOVEREIGN NEXUS
#
# Comprehensive CI/CD pipeline including:
#   - Code quality checks (linting, type checking)
#   - Unit and integration tests
#   - E2E testing with Playwright
#   - Security scanning
#   - Performance benchmarking
#   - Coverage reporting
#   - Automated deployments
# ═══════════════════════════════════════════════════════════════════════════════

name: 🔄 CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'feature/**'
      - 'fix/**'
      - 'release/**'
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean
      deploy_env:
        description: 'Deployment environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY: Cancel in-progress runs
# ─────────────────────────────────────────────────────────────────────────────

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────

env:
  NODE_VERSION: '20.x'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9.0.0'
  HUSKY: '0'

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # SETUP: Initialize and cache dependencies
  # ═══════════════════════════════════════════════════════════════════════════

  setup:
    name: 📦 Setup
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache.outputs.cache-primary-key }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Cache npm dependencies
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 📦 Install Node dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

  # ═══════════════════════════════════════════════════════════════════════════
  # LINT: Code quality checks
  # ═══════════════════════════════════════════════════════════════════════════

  lint:
    name: 🔍 Lint & Format Check
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 🔍 Run ESLint
        run: npm run lint:strict
        continue-on-error: true

      - name: 🎨 Check formatting
        run: npm run format:check
        continue-on-error: true

      - name: 📊 TypeScript check
        run: npm run typecheck

      - name: 📊 Upload lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            .eslintresults.json
            lint-report.txt
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # TEST: Unit and integration tests
  # ═══════════════════════════════════════════════════════════════════════════

  test:
    name: 🧪 Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 🧪 Run unit tests with coverage
        run: npm run test:coverage
        env:
          CI: true
          NODE_ENV: test

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: rs-toolkit-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: 📊 Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # E2E: End-to-end testing
  # ═══════════════════════════════════════════════════════════════════════════

  e2e:
    name: 🎭 E2E Tests
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        browser:
          - chromium
          - firefox
          - webkit

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: 🔨 Build application
        run: npm run build

      - name: 🎭 Run E2E tests
        run: npm run test:e2e -- --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: http://localhost:3000

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # PYTHON TEST: Python module tests
  # ═══════════════════════════════════════════════════════════════════════════

  python-test:
    name: 🐍 Python Tests
    needs: setup
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: 🧪 Run Python tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html \
            --junitxml=test-results.xml \
            -v --tb=short
        continue-on-error: true

      - name: 📊 Upload Python coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: pythontests
          name: rs-toolkit-python-coverage

  # ═══════════════════════════════════════════════════════════════════════════
  # SECURITY: Security scanning
  # ═══════════════════════════════════════════════════════════════════════════

  security:
    name: 🔒 Security Scan
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, python
          queries: security-and-quality

      - name: 🔨 Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'

      - name: 🔍 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 🔍 NPM Audit
        run: npm audit --audit-level=high --json > npm-audit.json || true

      - name: 🔍 Pip Audit
        run: |
          pip install pip-audit
          pip-audit --format json > pip-audit.json || true

      - name: 🔍 Run Snyk security scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD: Production build
  # ═══════════════════════════════════════════════════════════════════════════

  build:
    name: 🔨 Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next/cache
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: 🔨 Build for production
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: 📊 Analyze bundle
        run: npm run bundle:analyze || true
        continue-on-error: true

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            .next/
            public/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # PERFORMANCE: Lighthouse and performance checks
  # ═══════════════════════════════════════════════════════════════════════════

  performance:
    name: ⚡ Performance
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📤 Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 🚀 Start server
        run: |
          npm install -g serve
          serve -s .next -l 3000 &
          sleep 5

      - name: ⚡ Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/download
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: 📊 Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # DEPLOY: Deploy to staging/production
  # ═══════════════════════════════════════════════════════════════════════════

  deploy:
    name: 🚀 Deploy
    needs: [build, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.deploy_env || 'staging' }}
      url: https://t3rmuxk1ng.com

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📤 Download build
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: 🚀 Deploy to Vercel (Staging)
        if: github.event.inputs.deploy_env != 'production'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_SCOPE }}

      - name: 🚀 Deploy to Vercel (Production)
        if: github.event.inputs.deploy_env == 'production' || startsWith(github.ref, 'refs/tags/')
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_SCOPE }}

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFY: Send notifications
  # ═══════════════════════════════════════════════════════════════════════════

  notify:
    name: 📢 Notify
    needs: [lint, test, build, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📧 Send Discord notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ job.status == 'success' && '✅ CI/CD Pipeline Successful' || '❌ CI/CD Pipeline Failed' }}
          description: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
          color: ${{ job.status == 'success' && '0x00ff00' || '0xff0000' }}

      - name: 📧 Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
