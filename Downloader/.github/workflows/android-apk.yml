# ═══════════════════════════════════════════════════════════════════════════════
# RS TOOLKIT v3.0.1 ULTIMATE NEXUS - Android APK Build Workflow
# ═══════════════════════════════════════════════════════════════════════════════
# Author: RAJSARASWATI JATAV (RS) - T3rmuxk1ng
# License: OMNIPOTENT SOVEREIGN NEXUS
#
# This workflow builds Android APK files for the RS Toolkit mobile app.
# Includes:
#   - Multi-architecture builds (arm64-v8a, armeabi-v7a, x86_64)
#   - Signed release APKs
#   - App Bundle (AAB) for Play Store
#   - Automated version management
#   - Security scanning
#   - Upload to GitHub Releases
# ═══════════════════════════════════════════════════════════════════════════════

name: 📱 Android APK Build

on:
  push:
    branches:
      - main
      - master
      - 'release/**'
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'public/**'
      - 'android/**'
      - 'capacitor.config.*'
      - 'package.json'
      - '.github/workflows/android-apk.yml'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      upload_artifacts:
        description: 'Upload artifacts'
        required: true
        default: true
        type: boolean

# ─────────────────────────────────────────────────────────────────────────────
# CONCURRENCY: Cancel in-progress runs for same branch
# ─────────────────────────────────────────────────────────────────────────────

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# ENVIRONMENT VARIABLES
# ─────────────────────────────────────────────────────────────────────────────

env:
  NODE_VERSION: '20.x'
  JAVA_VERSION: '17'
  GRADLE_VERSION: '8.6'
  ANDROID_SDK_VERSION: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'
  NDK_VERSION: '26.2.11394342'
  CMAKE_VERSION: '3.22.1'

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # PREPARE: Setup and validation
  # ═══════════════════════════════════════════════════════════════════════════

  prepare:
    name: 📋 Prepare Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_code: ${{ steps.version.outputs.version_code }}
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 🔍 Check for changes
        id: check
        run: |
          # Check if there are relevant changes
          if git diff --name-only HEAD^ HEAD | grep -qE '^(src|app|components|lib|public|android|capacitor|package)'; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: 📝 Extract version
        id: version
        run: |
          # Extract version from package.json
          VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=$(echo $VERSION | tr -d '.' | head -c 6)

          # Add build number for CI builds
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${VERSION}+${{ github.run_number }}"
            VERSION_CODE="${VERSION_CODE}${{ github.run_number }}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "📦 Version: ${VERSION}"
          echo "🔢 Version Code: ${VERSION_CODE}"

  # ═══════════════════════════════════════════════════════════════════════════
  # BUILD: Build Android APK
  # ═══════════════════════════════════════════════════════════════════════════

  build:
    name: 🔨 Build APK (${{ matrix.arch }})
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64-v8a
          - armeabi-v7a
          - x86_64

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📁 Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> local.properties

      - name: 📦 Install dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm run cap:sync || true

      - name: 🔨 Build Next.js app
        run: |
          npm run build
          npm run export || true

      - name: 📱 Sync Capacitor
        run: |
          npx cap sync android

      - name: 🔐 Decode Keystore
        if: matrix.arch == 'arm64-v8a' && github.event.inputs.build_type != 'debug'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          fi

      - name: 🔨 Build APK
        working-directory: android
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"

          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=release.keystore \
              -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
              -Pandroid.injected.signing.key.alias=rs-toolkit \
              -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
              --parallel \
              --build-cache \
              -Dorg.gradle.daemon=false \
              -Dorg.gradle.workers.max=4
          else
            ./gradlew assembleDebug \
              --parallel \
              --build-cache \
              -Dorg.gradle.daemon=false
          fi

      - name: 📦 Build App Bundle (AAB)
        if: matrix.arch == 'arm64-v8a' && github.event.inputs.build_type != 'debug'
        working-directory: android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias=rs-toolkit \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --parallel \
            --build-cache

      - name: 📝 Rename APK
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type || 'release' }}"
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCH="${{ matrix.arch }}"

          # Find and rename APK
          APK_FILE=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -f "$APK_FILE" ]; then
            NEW_NAME="rs-toolkit-${VERSION}-${ARCH}-${BUILD_TYPE}.apk"
            mv "$APK_FILE" "$NEW_NAME"
            echo "apk_name=${NEW_NAME}" >> $GITHUB_ENV
          fi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.arch }}
          path: '*.apk'
          retention-days: 30
          compression-level: 9

      - name: 📤 Upload AAB Artifact
        if: matrix.arch == 'arm64-v8a' && github.event.inputs.build_type != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # SECURITY SCAN
  # ═══════════════════════════════════════════════════════════════════════════

  security-scan:
    name: 🔒 Security Scan
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-arm64-v8a
          path: ./artifacts

      - name: 🔍 Run MobSF Scan
        uses: opsbears/mobsf-action@v1
        with:
          apk-file: ./artifacts/*.apk
          output-format: json
          output-file: mobsf-report.json
        continue-on-error: true

      - name: 🔍 Run APKiD Scan
        run: |
          pip install apkid
          apkid ./artifacts/*.apk > apkid-report.txt
        continue-on-error: true

      - name: 📤 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            mobsf-report.json
            apkid-report.txt
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # RELEASE: Create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════════

  release:
    name: 🚀 Create Release
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 📋 Prepare release assets
        run: |
          mkdir -p release-assets
          find ./artifacts -name "*.apk" -exec cp {} release-assets/ \;
          find ./artifacts -name "*.aab" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: RS Toolkit v${{ needs.prepare.outputs.version }} - Android Release
          body: |
            ## 🚀 RS Toolkit v${{ needs.prepare.outputs.version }} - ULTIMATE NEXUS

            ### 📱 Android APK Downloads

            | Architecture | Download |
            |--------------|----------|
            | ARM64 (Recommended) | `rs-toolkit-*-arm64-v8a-release.apk` |
            | ARM v7 | `rs-toolkit-*-armeabi-v7a-release.apk` |
            | x86_64 | `rs-toolkit-*-x86_64-release.apk` |

            ### 📦 App Bundle (AAB)
            Available for Google Play Store deployment.

            ### ✨ Features
            - Elite Security Toolkit
            - Media Downloader
            - Multi-platform Support

            ### 👤 Author
            **RAJSARASWATI JATAV (RS) - T3rmuxk1ng**

            ---

            **Built with OMNIPOTENT SOVEREIGN NEXUS**
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true

  # ═══════════════════════════════════════════════════════════════════════════
  # NOTIFY: Send notifications
  # ═══════════════════════════════════════════════════════════════════════════

  notify:
    name: 📢 Notify
    needs: [build, release]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📧 Send Discord Notification
        if: success()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: "🚀 Android APK Build Successful"
          description: |
            Version: ${{ needs.prepare.outputs.version }}
            Architecture: All platforms
            Status: Success ✅
          color: 0x00ff00

      - name: 📧 Send Telegram Notification
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            🚀 RS Toolkit Android Build Complete!
            Version: ${{ needs.prepare.outputs.version }}
            Status: ✅ Success
