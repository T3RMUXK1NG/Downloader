name: 🔧 CI Pipeline

on:
  push:
    branches: [main, master, develop, 'release/*']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution'
        required: false
        default: 'false'
        type: boolean
      enable_benchmark:
        description: 'Run performance benchmarks'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9'
  CACHE_VERSION: 'v1'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # CODE QUALITY - Lint, Format, Type Check
  # ─────────────────────────────────────────────────────────────────────────────
  quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🔍 Run ESLint
        run: npm run lint -- --format json --output-file eslint-report.json || true

      - name: 🔍 Run TypeScript type check
        run: npm run typecheck

      - name: 🔍 Check code formatting
        run: npm run format:check || npm run format -- --check

      - name: 📊 Upload ESLint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # UNIT TESTS - Multi-platform test execution
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20', '22']
        exclude:
          - os: macos-latest
            node: '20'
          - os: windows-latest
            node: '20'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🧪 Run unit tests
        run: npm run test:coverage

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.os == 'ubuntu-latest' && matrix.node == '22'
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD - Multi-platform build verification
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [quality]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🏗️ Build application
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: 📊 Analyze bundle size
        if: matrix.os == 'ubuntu-latest'
        run: npm run bundle:size

      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            .next/
            !.next/cache/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # E2E TESTS - End-to-end testing with Playwright
  # ─────────────────────────────────────────────────────────────────────────────
  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [build]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-ubuntu-latest
          path: .next

      - name: 🎭 Run E2E tests
        run: npm run test:e2e
        env:
          CI: true

      - name: 📊 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: 📊 Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # PERFORMANCE BENCHMARKS
  # ─────────────────────────────────────────────────────────────────────────────
  benchmark:
    name: ⚡ Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]
    if: ${{ github.event.inputs.enable_benchmark == 'true' || github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-ubuntu-latest
          path: .next

      - name: 🚀 Start server
        run: npm run start &
        env:
          NODE_ENV: production

      - name: ⏳ Wait for server
        run: npx wait-on http://localhost:3000 -t 60000

      - name: ⚡ Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://localhost:3000
            http://localhost:3000/api/health
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: 📊 Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # DEPENDENCY CHECK
  # ─────────────────────────────────────────────────────────────────────────────
  deps:
    name: 📦 Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Check for outdated dependencies
        run: npm run deps:check || true

      - name: 🔒 Security audit
        run: npm run deps:audit || true

      - name: 📊 Generate dependency report
        run: |
          npm list --depth=0 --json > dependency-tree.json || true
          npm audit --json > audit-report.json || true

      - name: 📊 Upload dependency reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-reports
          path: |
            dependency-tree.json
            audit-report.json
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # SUMMARY - Aggregate results
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: 📋 CI Summary
    runs-on: ubuntu-latest
    needs: [quality, test, build, e2e]
    if: always()

    steps:
      - name: 📊 Generate CI Summary
        run: |
          echo "## 🔧 RS TOOLKIT CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Code Quality | ${{ needs.quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Unit Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎭 E2E Tests | ${{ needs.e2e.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Author:** RAJSARASWATI JATAV (RS) - T3rmuxk1ng" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**License:** OMNIPOTENT SOVEREIGN NEXUS" >> $GITHUB_STEP_SUMMARY

      - name: ✅ CI Status Check
        if: contains(needs.*.result, 'failure')
        run: exit 1
