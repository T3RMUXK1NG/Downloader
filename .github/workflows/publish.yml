name: 🚀 Publish Release

on:
  release:
    types: [published]

jobs:
  # ===========================================
  # Build and Publish Python Package
  # ===========================================
  publish-python:
    name: 🐍 Publish Python Package
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: 🔨 Build Package
        run: |
          python -m build || echo "Build skipped - no setup.py"

      - name: 📤 Publish to PyPI
        if: hashFiles('dist/*')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* || echo "PyPI upload skipped (no token or no dist)"

  # ===========================================
  # Build and Push Docker Image
  # ===========================================
  publish-docker:
    name: 🐳 Publish Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: 🏷️ Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: 🔨 Build Docker Image
        run: |
          docker build -t ghcr.io/t3rmuxk1ng/downloader:${{ steps.version.outputs.version }} . || echo "Docker build skipped"
          docker tag ghcr.io/t3rmuxk1ng/downloader:${{ steps.version.outputs.version }} ghcr.io/t3rmuxk1ng/downloader:latest || true

      - name: 📤 Push Docker Image
        run: |
          docker push ghcr.io/t3rmuxk1ng/downloader:${{ steps.version.outputs.version }} || echo "Docker push skipped - may need permissions"
          docker push ghcr.io/t3rmuxk1ng/downloader:latest || true

  # ===========================================
  # Notify on Success
  # ===========================================
  notify:
    name: 📢 Notify Release
    needs: [publish-python, publish-docker]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: 📢 Send Notification
        run: |
          echo "🔱 GOD MODE NEXUS Release Pipeline Completed!"
          echo "Version: ${{ github.event.release.tag_name }}"
          echo "Repository: https://github.com/T3RMUXK1NG/Downloader"
