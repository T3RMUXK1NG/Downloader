name: 🐳 Docker Build

on:
  push:
    branches: [main, master, develop]
    tags: ['v*']
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'src/**'
      - 'app/**'
      - 'public/**'
      - '.github/workflows/docker.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'Dockerfile'
  workflow_dispatch:
    inputs:
      push_image:
        description: 'Push image to registry'
        required: false
        default: true
        type: boolean
      platforms:
        description: 'Build platforms'
        required: false
        default: 'linux/amd64,linux/arm64'
        type: string
      build_target:
        description: 'Build target'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - development
          - full
          - minimal
          - testing

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # LINT - Dockerfile linting
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Docker Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: warning
          format: sarif
          output-file: hadolint-results.sarif

      - name: 📊 Upload Hadolint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hadolint-results
          path: hadolint-results.sarif
          retention-days: 7

      - name: 🔍 Dockerfile analysis
        run: |
          echo "## 🐳 Dockerfile Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Targets" >> $GITHUB_STEP_SUMMARY
          grep -E "^FROM .* AS" Dockerfile | sed 's/^FROM .* AS /- /' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Base Images" >> $GITHUB_STEP_SUMMARY
          grep -E "^FROM" Dockerfile | grep -v "AS" | sed 's/^FROM /- /' >> $GITHUB_STEP_SUMMARY || true

  # ─────────────────────────────────────────────────────────────────────────────
  # BUILD - Multi-platform Docker builds
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [lint]

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: production
            platforms: linux/amd64
          - target: full
            platforms: linux/amd64
          - target: minimal
            platforms: linux/amd64

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to Container Registry
        if: github.event.inputs.push_image != 'false'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: 📦 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          flavor: |
            suffix=-${{ matrix.target }},onlatest=true

      - name: 🏗️ Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: ${{ github.event.inputs.push_image != 'false' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ matrix.platforms }}
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          outputs: type=docker,dest=/tmp/image-${{ matrix.target }}.tar
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: 📊 Analyze image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          push: false
          platforms: linux/amd64
          outputs: type=docker,dest=/tmp/analyze-${{ matrix.target }}.tar
          cache-from: type=gha,scope=${{ matrix.target }}

      - name: 📊 Load image for analysis
        run: |
          docker load --input /tmp/analyze-${{ matrix.target }}.tar
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          echo "## 📊 Image Analysis: ${{ matrix.target }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${IMAGE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | \`$(docker images ${IMAGE} --format '{{.Size}}')\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ matrix.platforms }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: 📤 Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ matrix.target }}
          path: /tmp/image-${{ matrix.target }}.tar
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # MULTI-ARCH - Build multi-architecture images
  # ─────────────────────────────────────────────────────────────────────────────
  multi-arch:
    name: 🌐 Multi-Arch Build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    needs: [lint]
    if: github.event_name != 'pull_request'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          platforms: linux/amd64,linux/arm64

      - name: 📦 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: 🔐 Cosign setup
        uses: sigstore/cosign-installer@v3.5.0

      - name: 🏗️ Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event.inputs.platforms || 'linux/amd64,linux/arm64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

      - name: ✍️ Sign image with Cosign
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      - name: 📊 Verify image signature
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          for tag in ${TAGS}; do
            cosign verify \
              --certificate-identity-regexp="https://github.com/${{ github.repository }}/*" \
              --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
              "${tag}@${DIGEST}"
          done

      - name: 📊 Generate SBOM
        uses: anchore/sbom-action@v0.17.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # SCAN - Container security scanning
  # ─────────────────────────────────────────────────────────────────────────────
  scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build]

    steps:
      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-production
          path: /tmp

      - name: 📊 Load Docker image
        run: |
          docker load --input /tmp/image-production.tar
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          echo "LOADED_IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: 🔒 Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.LOADED_IMAGE }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: 🔒 Trivy vulnerability scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.LOADED_IMAGE }}
          format: 'table'
          output: 'trivy-results.txt'
          exit-code: '0'
          ignore-unfixed: true

      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: 📊 Scan summary
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat trivy-results.txt >> $GITHUB_STEP_SUMMARY

      - name: 🔒 Grype vulnerability scan
        uses: anchore/scan-action@v4
        with:
          image: ${{ env.LOADED_IMAGE }}
          fail-build: false
          severity-cutoff: high
          output-format: table

      - name: 🔍 Snyk scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.LOADED_IMAGE }}
          args: --file=Dockerfile

  # ─────────────────────────────────────────────────────────────────────────────
  # TEST - Container runtime tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: 🧪 Container Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build]

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-production
          path: /tmp

      - name: 📊 Load Docker image
        run: |
          docker load --input /tmp/image-production.tar
          IMAGE=$(docker images --format '{{.Repository}}:{{.Tag}}' | head -1)
          echo "LOADED_IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: 🚀 Start container
        run: |
          docker run -d --name rs-toolkit-test \
            -p 3000:3000 \
            -e NODE_ENV=production \
            ${{ env.LOADED_IMAGE }}

      - name: ⏳ Wait for container to start
        run: |
          echo "Waiting for container to start..."
          sleep 10
          for i in {1..30}; do
            if docker exec rs-toolkit-test wget -q --spider http://localhost:3000 2>/dev/null; then
              echo "Container is healthy!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Container failed to start"
          docker logs rs-toolkit-test
          exit 1

      - name: 🧪 Run health checks
        run: |
          echo "## 🧪 Container Health Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Basic health check
          curl -s http://localhost:3000/api/health || echo "Health endpoint not available"
          
          # Check container logs
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Container Logs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker logs rs-toolkit-test 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📊 Container resource usage
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resource Usage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker stats --no-stream rs-toolkit-test >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 🧹 Cleanup
        if: always()
        run: |
          docker stop rs-toolkit-test || true
          docker rm rs-toolkit-test || true

  # ─────────────────────────────────────────────────────────────────────────────
  # SUMMARY - Docker build summary
  # ─────────────────────────────────────────────────────────────────────────────
  summary:
    name: 📋 Docker Summary
    runs-on: ubuntu-latest
    needs: [lint, build, multi-arch, scan, test]
    if: always()

    steps:
      - name: 📊 Generate summary
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Multi-Arch | ${{ needs.multi-arch.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔒 Security Scan | ${{ needs.scan.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Runtime Test | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
