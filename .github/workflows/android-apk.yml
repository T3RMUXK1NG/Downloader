name: 📱 Android APK Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  GRADLE_VERSION: '8.6'

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm ci --prefer-offline --no-audit || npm install

      - name: 🔨 Build Next.js static export
        run: |
          npm run build
          npx cap sync android || true

      - name: 📱 Add Android platform
        run: npx cap add android || true

      - name: 📱 Sync Capacitor
        run: npx cap sync android

      - name: 🔨 Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --parallel --build-cache

      - name: 📦 Rename APK
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK_FILE=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ -f "$APK_FILE" ]; then
            NEW_NAME="rs-toolkit-v${VERSION}.apk"
            cp "$APK_FILE" "$NEW_NAME"
            echo "apk_name=${NEW_NAME}" >> $GITHUB_ENV
          fi

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rs-toolkit-apk
          path: '*.apk'
          retention-days: 30

  release:
    name: 🚀 Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: rs-toolkit-apk
          path: ./apk

      - name: 📋 Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: RS Toolkit v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 RS Toolkit v${{ steps.version.outputs.version }} - ULTIMATE NEXUS

            ### 📱 Features
            - Elite Security Toolkit
            - Media Downloader (50+ Platforms)
            - Multi-format Support
            - Batch Download
            - Video/Audio Processing
            - AI Integration
            - Cloud Sync
            - Offline Mode

            ### 👤 Author
            **RAJSARASWATI JATAV (RS) - T3rmuxk1ng**

            ---

            **Built with OMNIPOTENT SOVEREIGN NEXUS**
          files: ./apk/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
